name: Auto-label PR

# Auto-tag pull requests with `area: …` and `framework: …` labels based on the
# files they touch. Pure tagging — never approves anything.
#
# Uses `pull_request_target` so it runs with the base repo's token even on
# PRs from forks (the action only reads paths, not contents — safe).

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

# OpenSSF Scorecard "Token-Permissions": top-level empty; the single job
# re-declares the write scope it actually needs.
permissions: {}

jobs:
  label:
    name: Apply path-based labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
