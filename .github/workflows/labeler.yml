name: Auto-label PR

# Auto-tag pull requests with `area: …` and `framework: …` labels based on the
# files they touch. Pure tagging — never approves anything.
#
# Uses `pull_request_target` so it runs with the base repo's token even on
# PRs from forks (the action only reads paths, not contents — safe).

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply path-based labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
