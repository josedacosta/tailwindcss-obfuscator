name: Bug Report
description: Report a reproducible problem with tailwindcss-obfuscator
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below so we can investigate efficiently.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched the existing issues and discussions.
          required: true
        - label: I am using the latest version of tailwindcss-obfuscator.
          required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: dropdown
    id: tailwind
    attributes:
      label: Tailwind CSS version
      options:
        - v4
        - v3
        - other
    validations:
      required: true

  - type: dropdown
    id: bundler
    attributes:
      label: Bundler / framework
      options:
        - Vite
        - Webpack
        - Rollup
        - esbuild
        - Next.js
        - Nuxt
        - SvelteKit
        - Astro
        - Remix
        - Qwik
        - Solid Start
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link to a repo, gist, or stackblitz that reproduces the issue.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node.js version, package manager, etc.
      placeholder: |
        - OS: macOS 14
        - Node: 20.10
        - Package manager: pnpm 9
