# CodeRabbit configuration — https://docs.coderabbit.ai/guides/configuration
#
# CodeRabbit is an AI code reviewer for GitHub PRs. Free for public OSS repos.
# Install the GitHub App at https://github.com/marketplace/coderabbit then this
# file is picked up automatically on every PR.
#
# IMPORTANT for this repo: CodeRabbit posts review COMMENTS only.
# It is NOT a code owner. It cannot approve PRs, cannot satisfy the
# require_code_owner_reviews gate, and cannot merge anything. The merge
# decision belongs exclusively to @josedacosta.

language: en-US
early_access: false

reviews:
  # High-detail review on every PR. Auto-runs on PR open + sync.
  profile: chill
  request_changes_workflow: false # don't formally "request changes" — just comment
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  poem: false # skip the poems, keep it focused
  review_status: true
  collapse_walkthrough: true # PRs touch many files; keep the body compact

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
    # Skip review on branches that are pure version bumps or auto-generated
    ignore_title_keywords:
      - "chore(release): version packages"
      - "chore(deps):"

  # Path-aware review priorities — tells CodeRabbit what matters per area.
  path_filters:
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/.nuxt/**"
    - "!**/.svelte-kit/**"
    - "!**/.astro/**"
    - "!pnpm-lock.yaml"
    - "!**/CHANGELOG.md" # auto-generated by changesets
    - "!**/*.lock"
    - "!**/coverage/**"
    - "!docs/.vitepress/dist/**"
    - "!docs/.vitepress/cache/**"
    - "!jose/**" # local-only maintainer notes (gitignored anyway)
    - "!reports/**" # local audit outputs (gitignored anyway)

  path_instructions:
    - path: "packages/tailwindcss-obfuscator/src/**"
      instructions: |
        This is the published package source. Be strict on:
        - Public API stability (types, function signatures, plugin entry points).
        - Tailwind v3 + v4 compatibility.
        - Whether a `.changeset/*.md` accompanies any user-facing change.
        - Edge cases for AST extraction (Babel) and CSS transformation (PostCSS).
        - That the change does not break `cn() / clsx() / cva() / tv()` recognition.
    - path: "packages/tailwindcss-obfuscator/tests/**"
      instructions: |
        Verify new tests cover the intended behaviour and edge cases.
        Flag any test that imports from `dist/` instead of `src/`.
    - path: "docs/**"
      instructions: |
        Docs are deployed automatically to GitHub Pages on every merge.
        Verify links resolve, code samples are syntactically valid for the framework
        they target, and the `outline: deep` frontmatter is set on guide pages.
    - path: ".github/workflows/**"
      instructions: |
        Workflow changes are sensitive. Flag any:
        - Use of `pull_request_target` without explaining why (security implication).
        - Missing `permissions:` block (defaults are too broad).
        - Use of unpinned third-party actions (always pin to a SHA or major version).
        - Secret usage that might leak in fork-triggered runs.
    - path: "apps/**"
      instructions: |
        Sample apps are not published. Focus on whether the app correctly
        demonstrates the obfuscator integration and whether `pnpm build` still
        produces obfuscated output.

  # Don't flood every PR with a checklist; only when truly relevant.
  tools:
    languagetool:
      enabled: true
      level: default
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    shellcheck:
      enabled: true

chat:
  auto_reply: true
